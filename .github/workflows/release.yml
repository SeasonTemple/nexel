name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ADR-0018: server-side equivalent of the local pre-push review gate.
  # The bless marker at `.nexel/release-blessed-<tag>` is gitignored
  # (ADR-0008) and cannot reach the CI runner via `actions/checkout`, so
  # we re-derive the gate by re-running the deterministic portions of the
  # release-time review (`npm test`, `npm run release:preflight`,
  # `npm run lint:release-sync`) and refusing to advance to the publish
  # job if any commit in the tag's history advertises a hook bypass.
  # On success, this job sets the `blessed` output, which the `release`
  # job consumes via `needs.review-gate.outputs.blessed == 'true'` and
  # surfaces to `verify-release-tag.mjs` via `NEXEL_CI_BLESSED=true`.
  review-gate:
    name: ADR-0013 release-time review gate
    runs-on: ubuntu-latest
    outputs:
      blessed: ${{ steps.gate.outputs.blessed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Re-run deterministic review checks
        id: gate
        run: |
          set -euo pipefail
          npm test
          npm run release:preflight
          npm run lint:release-sync
          # Reject any commit since the previous tag whose message advertises
          # a local hook bypass — those are exactly the escape hatches
          # ADR-0013 documents but does not want silently shipped.
          #
          # Phase 4 P1 fixes:
          #   - Phase 4 P1 #2: fall back to full ref history (not HEAD~20)
          #     when there is no prior tag. A bypass commit at depth 21+ in a
          #     shallow-history scenario would have slipped through the
          #     bounded fallback.
          #   - Phase 4 P1 #1: anchor regex with word boundaries; drop -i.
          #     The previous `grep -Ei "no-verify"` matched innocent docs
          #     commits like `docs(adr): document --no-verify escape hatch`,
          #     producing false-positives. This scan is defense-in-depth
          #     against self-incrimination; the marker-SHA binding remains
          #     the actual enforcement.
          prev_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")"
          if [ -n "$prev_tag" ]; then
            range="${prev_tag}..${GITHUB_REF_NAME}"
          else
            range="${GITHUB_REF_NAME}"
          fi
          if git log --format=%B "$range" | grep -E '(\-\-no-verify|HUSKY=0|core\.hooksPath=/dev/null)\b'; then
            echo "review-gate: commit message in ${range} advertises a hook bypass; refusing to bless." >&2
            exit 1
          fi
          echo "blessed=true" >> "$GITHUB_OUTPUT"

  release:
    name: Build and publish release
    needs: review-gate
    if: needs.review-gate.outputs.blessed == 'true'
    runs-on: ubuntu-latest
    env:
      # ADR-0018: consumed by `scripts/verify-release-tag.mjs` as proof
      # that the server-side review-gate job ran and passed. The marker
      # file is gitignored, so this env var is the CI-side transport.
      NEXEL_CI_BLESSED: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag, package, and release note
        run: node scripts/verify-release-tag.mjs "$GITHUB_REF_NAME"

      - name: Run tests
        run: npm test

      - name: Release preflight
        run: npm run release:preflight

      - name: Build dist artifact
        run: npm run dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "docs/release-notes/$GITHUB_REF_NAME.md" \
            "nexel-${VERSION}.tgz" \
            "nexel-${VERSION}.tgz.sha256"
