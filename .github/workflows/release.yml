name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag, package, and release note
        run: node scripts/verify-release-tag.mjs "$GITHUB_REF_NAME"

      - name: Run tests
        run: npm test

      - name: Release preflight
        run: npm run release:preflight

      - name: Build dist artifact
        run: npm run dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file "docs/release-notes/$GITHUB_REF_NAME.md" \
            "nexel-${VERSION}.tgz" \
            "nexel-${VERSION}.tgz.sha256"
